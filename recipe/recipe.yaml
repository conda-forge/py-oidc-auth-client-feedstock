context:
  version: "2603.0.1"

package:
  name: py-oidc-auth-client
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/p/py-oidc-auth-client/py_oidc_auth_client-${{ version }}.tar.gz
    sha256: 85971187e8ca268e402a27d27d6c02f44f74a8765e68c54b6dafa3dbca7ea97a

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . --no-deps -vv
  python:
    entry_points:
      - oidc-auth = py_oidc_auth_client.__main__:main
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - flit-core
    - pip
  run:
    - python >=${{ python_min }}
    - httpx
    - platformdirs
    - rich
    - typing-extensions

tests:
  - python:
      imports:
        - py_oidc_auth_client
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Client library for the OIDC Auth server.
  description: |
    py-oidc-auth-client is the counterpart of the server-side library **py-oidc-auth**.

    While **py-oidc-auth** helps you add OpenID Connect login, token, and device endpoints to web frameworks,
    **py-oidc-auth-client** consumes those routes and gives you ready-to-use bearer tokens for calling protected APIs.
  documentation: https://py-oidc-auth-client.readthedocs.io
  homepage: https://github.com/freva-org/py-oidc-auth-client
  license: BSD-3-Clause
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - antarcticrainforest
